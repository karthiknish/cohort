<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent mode accessibility fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
      }
      .sheet {
        position: fixed;
        top: 0;
        right: 0;
        width: min(520px, 100vw);
        height: 100vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #ddd;
      }
      .header,
      .composer {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
      }
      .messages {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }
      .composer {
        border-top: 1px solid #eee;
        border-bottom: 0;
      }
      textarea {
        width: 100%;
        min-height: 72px;
      }
      button:focus-visible,
      textarea:focus-visible,
      [role='option']:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
      .mention-list {
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 8px;
        padding: 4px;
      }
      [role='option'][aria-selected='true'] {
        background: #eff6ff;
      }
    </style>
  </head>
  <body>
    <div class="overlay" aria-hidden="true"></div>
    <section
      class="sheet"
      role="dialog"
      aria-modal="true"
      aria-labelledby="agent-mode-dialog-title"
    >
      <header class="header">
        <h1 id="agent-mode-dialog-title">Agent Mode</h1>
        <button type="button" aria-label="Close Agent Mode">Close</button>
      </header>

      <div class="messages" aria-live="off">
        <p>You · 10:02 AM</p>
        <p>Summarize my tasks due this week</p>
        <p>Agent · 10:02 AM</p>
        <p>Three tasks are due this week.</p>
      </div>

      <footer class="composer">
        <div
          id="agent-mention-listbox"
          class="mention-list"
          role="listbox"
          aria-label="Mention suggestions"
        >
          <div id="mention-opt-1" role="option" aria-selected="true">@Acme Corp</div>
          <div id="mention-opt-2" role="option" aria-selected="false">@Website Refresh</div>
        </div>
        <label for="agent-message">Agent message</label>
        <textarea
          id="agent-message"
          role="combobox"
          aria-expanded="true"
          aria-controls="agent-mention-listbox"
          aria-autocomplete="list"
          aria-label="Agent message"
        >@Ac</textarea>
        <button type="button" aria-label="Attach context files">Attach</button>
        <button type="button" aria-label="Send message">Send</button>
      </footer>
    </section>
  </body>
</html>
