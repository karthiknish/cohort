name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load CI environment
        run: cp config/ci.env .env.local

      - name: Verify CI environment
        run: test -f .env.local && grep -q NEXT_PUBLIC_CONVEX_SITE_URL .env.local

      - name: Static checks
        run: bun run ci:check

      - name: Unit tests
        run: bun run ci:test

      - name: Build application
        run: bun run ci:build
